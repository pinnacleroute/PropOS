<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropOS — Enterprise Real Estate CRM + ERP</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-w:228px;
  --hdr:52px;
  --c-bg:#0f1117;
  --c-surface:#181c27;
  --c-card:#1e2336;
  --c-card2:#232840;
  --c-border:#2a3050;
  --c-border2:#363f66;
  --c-text:#e8eaf6;
  --c-muted:#8892b0;
  --c-accent:#4f7cff;
  --c-accent2:#6c63ff;
  --c-green:#22c55e;
  --c-amber:#f59e0b;
  --c-red:#ef4444;
  --c-teal:#14b8a6;
  --c-pink:#ec4899;
  --c-purple:#a855f7;
  --font:'IBM Plex Sans',system-ui,sans-serif;
  --radius:8px;
  --radius-lg:12px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--c-bg);color:var(--c-text);font-family:var(--font);font-size:13px}
button{cursor:pointer;font-family:var(--font)}
input,select,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c-border2);border-radius:4px}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--c-surface);border-right:1px solid var(--c-border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:15px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--c-border)}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,#4f7cff,#a855f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.logo-name{font-size:16px;font-weight:700;letter-spacing:-.4px}
.logo-ver{font-size:10px;color:var(--c-muted)}
.sidebar-section{padding:14px 14px 4px;font-size:10px;font-weight:700;color:var(--c-muted);letter-spacing:.9px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 13px;margin:1px 7px;border-radius:7px;cursor:pointer;color:var(--c-muted);transition:all .15s;font-size:12.5px;position:relative}
.nav-item:hover{background:var(--c-card);color:var(--c-text)}
.nav-item.active{background:rgba(79,124,255,.14);color:var(--c-accent)}
.nav-item.active::before{content:'';position:absolute;left:-7px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--c-accent);border-radius:0 3px 3px 0}
.nav-item i{font-size:15px;width:18px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;padding:1px 7px;border-radius:99px;font-weight:700}
.badge-red{background:var(--c-red);color:#fff}
.badge-amber{background:var(--c-amber);color:#111}
.badge-green{background:var(--c-green);color:#fff}
.sidebar-footer{margin-top:auto;border-top:1px solid var(--c-border);padding:10px 7px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--hdr);background:var(--c-surface);border-bottom:1px solid var(--c-border);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;flex:1}
.tb-btn{background:var(--c-card);border:1px solid var(--c-border);color:var(--c-text);padding:5px 13px;border-radius:7px;display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;transition:border-color .15s}
.tb-btn:hover{border-color:var(--c-accent)}
.role-pill{background:rgba(79,124,255,.18);color:var(--c-accent);font-size:11px;padding:4px 12px;border-radius:99px;font-weight:700;white-space:nowrap}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;background:linear-gradient(135deg,#4f7cff,#a855f7)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:22px 24px}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:13px;margin-bottom:20px}
.kpi-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius-lg);padding:15px}
.kpi-label{font-size:11px;color:var(--c-muted);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.kpi-value{font-size:23px;font-weight:700}
.kpi-trend{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:3px}
.trend-up{color:var(--c-green)}
.trend-down{color:var(--c-red)}

/* ── PANELS ── */
.panel{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius-lg);padding:17px}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.panel-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.panel-action{font-size:11px;color:var(--c-accent);background:none;border:none;cursor:pointer}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
.mb-16{margin-bottom:16px}

/* ── BUTTONS ── */
.btn{border:none;padding:7px 15px;border-radius:7px;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--c-accent);color:#fff}
.btn-primary:hover{background:#3d6dff}
.btn-ghost{background:transparent;border:1px solid var(--c-border2);color:var(--c-muted)}
.btn-ghost:hover{border-color:var(--c-accent);color:var(--c-accent)}
.btn-success{background:rgba(34,197,94,.15);color:var(--c-green);border:1px solid rgba(34,197,94,.3)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--c-red);border:1px solid rgba(239,68,68,.3)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:400px}
th{font-size:11px;font-weight:700;color:var(--c-muted);text-align:left;padding:7px 9px;border-bottom:1px solid var(--c-border);white-space:nowrap}
td{font-size:12px;padding:8px 9px;border-bottom:1px solid var(--c-border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.018)}

/* ── BADGES / TAGS ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}
.badge-hot{background:rgba(239,68,68,.18);color:#f87171}
.badge-warm{background:rgba(245,158,11,.18);color:#fbbf24}
.badge-cold{background:rgba(96,165,250,.18);color:#93c5fd}
.badge-source{background:rgba(79,124,255,.14);color:var(--c-accent);border:1px solid rgba(79,124,255,.2)}
.badge-stage{background:var(--c-surface);border:1px solid var(--c-border2);color:var(--c-muted)}
.badge-ok{background:rgba(34,197,94,.14);color:var(--c-green)}
.badge-warn{background:rgba(245,158,11,.14);color:var(--c-amber)}
.badge-err{background:rgba(239,68,68,.14);color:var(--c-red)}
.badge-info{background:rgba(79,124,255,.14);color:var(--c-accent)}
.badge-purple{background:rgba(168,85,247,.14);color:var(--c-purple)}

/* ── LEAD CARDS ── */
.lead-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);padding:13px;margin-bottom:9px;cursor:pointer;transition:border-color .15s}
.lead-card:hover{border-color:var(--c-accent)}
.lead-name{font-weight:700;font-size:13px}
.score-bar-wrap{flex:1;height:4px;background:var(--c-border);border-radius:2px;overflow:hidden}
.score-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#4f7cff,#a855f7)}
.lead-meta{font-size:11px;color:var(--c-muted);display:flex;gap:14px;flex-wrap:wrap}

/* ── ALERT BANNER ── */
.alert{border-radius:var(--radius);padding:10px 14px;display:flex;gap:9px;align-items:center;font-size:12px;margin-bottom:14px}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.28);color:var(--c-amber)}
.alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.28);color:var(--c-red)}
.alert-info{background:rgba(79,124,255,.1);border:1px solid rgba(79,124,255,.28);color:var(--c-accent)}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.28);color:var(--c-green)}

/* ── FUNNEL ── */
.funnel-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.funnel-label{width:118px;font-size:11px;color:var(--c-muted);text-align:right;flex-shrink:0}
.funnel-fill{height:23px;border-radius:5px;display:flex;align-items:center;padding:0 9px;font-size:11px;font-weight:700;color:#fff;min-width:36px;transition:width .6s}

/* ── TIMELINE ── */
.tl-item{display:flex;gap:11px;margin-bottom:13px;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:23px;bottom:-13px;width:1px;background:var(--c-border)}
.tl-dot{width:23px;height:23px;border-radius:50%;background:var(--c-card);border:2px solid var(--c-accent);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;z-index:1}
.tl-body{flex:1;background:var(--c-surface);border:1px solid var(--c-border);border-radius:7px;padding:8px 11px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--c-surface);border:1px solid var(--c-border2);border-radius:14px;width:min(540px,100%);max-height:88vh;overflow-y:auto;padding:24px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--c-muted);font-size:20px;cursor:pointer;line-height:1}

/* ── FORMS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:var(--c-muted);font-weight:600}
.form-input{background:var(--c-card);border:1px solid var(--c-border);border-radius:7px;padding:7px 11px;color:var(--c-text);font-size:12px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--c-accent)}
select.form-input option{background:var(--c-card)}

/* ── PROGRESS ── */
.prog-wrap{background:var(--c-border);height:5px;border-radius:3px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:3px;transition:width .6s}

/* ── NOTIF ITEMS ── */
.notif-item{display:flex;gap:10px;align-items:flex-start;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);padding:10px 12px;margin-bottom:7px}
.notif-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;gap:3px;max-height:290px;overflow-y:auto;padding:4px 0}
.chat-bubble{max-width:78%;padding:9px 13px;border-radius:12px;margin-bottom:4px;font-size:12px;line-height:1.55}
.chat-in{background:#1e2f3e;border-radius:12px 12px 12px 3px;align-self:flex-start}
.chat-out{background:rgba(37,211,102,.15);border:1px solid rgba(37,211,102,.28);color:#4ade80;border-radius:12px 12px 3px 12px;align-self:flex-end}
.chat-sys{background:rgba(79,124,255,.1);border:1px solid rgba(79,124,255,.2);color:var(--c-accent);border-radius:8px;align-self:flex-start;font-size:11px}
.chat-time{font-size:10px;color:var(--c-muted);margin-top:2px}

/* ── INVENTORY ── */
.inv-unit{border-radius:5px;font-size:9px;font-weight:700;cursor:pointer;text-align:center;padding:5px 2px;border:1px solid transparent;transition:transform .12s}
.inv-unit:hover{transform:scale(1.18);z-index:5;position:relative}
.u-avail{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.4);color:#4ade80}
.u-hold{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.4);color:#fbbf24}
.u-soft{background:rgba(168,85,247,.16);border-color:rgba(168,85,247,.4);color:#c084fc}
.u-booked{background:rgba(79,124,255,.18);border-color:rgba(79,124,255,.4);color:#818cf8}
.u-sold{background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.3);color:#f87171}

/* ── AI CARDS ── */
.ai-card{border-radius:10px;padding:14px;margin-bottom:10px;background:linear-gradient(135deg,rgba(79,124,255,.07),rgba(168,85,247,.07));border:1px solid rgba(79,124,255,.2)}
.ai-priority{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-bottom:6px}

/* ── OCR ── */
.ocr-field{background:var(--c-card2);border:1px solid var(--c-border2);border-radius:7px;padding:9px 11px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ocr-conf{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;flex-shrink:0}
.ocr-hi{background:rgba(34,197,94,.18);color:var(--c-green)}
.ocr-med{background:rgba(245,158,11,.18);color:var(--c-amber)}
.ocr-lo{background:rgba(239,68,68,.18);color:var(--c-red)}

/* ── AGENT CARD ── */
.agent-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);padding:11px;text-align:center}

/* ── MILESTONE ── */
.ms-item{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--c-border)}
.ms-item:last-child{border-bottom:none}
.ms-icon{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ── MOBILE FRAME ── */
.mobile-frame{width:262px;background:#0d0d0d;border-radius:30px;border:3px solid var(--c-border2);padding:8px;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.mobile-screen{background:var(--c-card);border-radius:24px;overflow:hidden;min-height:490px}
.mobile-bar{background:var(--c-accent);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--c-card);border-radius:8px;padding:3px;margin-bottom:16px;border:1px solid var(--c-border);flex-wrap:wrap}
.tab{padding:6px 15px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--c-muted);border:none;background:none;transition:all .15s}
.tab.active{background:var(--c-accent);color:#fff}

/* ── PILLS ── */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.pill{padding:5px 13px;border-radius:99px;font-size:11px;cursor:pointer;border:1px solid var(--c-border);background:transparent;color:var(--c-muted);font-weight:600;transition:all .15s}
.pill.active{background:var(--c-accent);border-color:var(--c-accent);color:#fff}

/* ── ROUTING ── */
.rule-row{background:var(--c-surface);border:1px solid var(--c-border);border-radius:7px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:center}
.rule-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── CP CARD ── */
.cp-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:flex;gap:12px;align-items:center}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;height:100px;color:var(--c-muted);gap:8px;font-size:12px}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--c-bg);padding:20px}
.login-card{background:var(--c-surface);border:1px solid var(--c-border2);border-radius:16px;padding:34px;width:390px;max-width:100%}
.login-logo{display:flex;align-items:center;gap:11px;margin-bottom:8px;justify-content:center}
.role-btn{width:100%;background:var(--c-card);border:1px solid var(--c-border);border-radius:8px;padding:11px 15px;color:var(--c-text);text-align:left;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-family:var(--font);font-weight:500;transition:border-color .15s}
.role-btn:hover{border-color:var(--c-accent)}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="login-wrap" id="loginRoot"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   MOCK DATA
═══════════════════════════════════════════ */
const ROLES=['Super Admin','Director','Sales Manager','Sales Executive','Channel Partner','Finance Executive','Site Visit Coordinator'];
const ROLE_SHORT={'Super Admin':'SA','Director':'DR','Sales Manager':'SM','Sales Executive':'SE','Channel Partner':'CP','Finance Executive':'FE','Site Visit Coordinator':'SV'};
const SOURCES=['Facebook','Instagram','Google Ads','MagicBricks','Housing.com','99Acres','Website'];
const STAGES=['New','Contacted','Site Visit','Negotiation','Booking','Closed','Lost'];
const AGENTS=['Rohit Sharma','Priya Mehta','Aakash Verma','Sunita Rao','Deepak Joshi','Kavya Nair','Arjun Singh'];
const PROJECTS=['Emerald Heights','Sapphire Residences','Lotus Grande'];
const NAMES=['Ramesh Kumar','Sunil Gupta','Anita Sharma','Vijay Patel','Meena Singh','Arjun Malhotra','Pooja Yadav','Kiran Desai','Rajesh Iyer','Sunita Nair','Anil Verma','Priya Chaudhary','Deepak Joshi','Kavita Mishra','Manish Tiwari','Geeta Rajan','Ashok Pandey','Lavanya Menon','Suresh Reddy','Chitra Bhatt','Vikram Shah','Nandini Pillai','Harish Bose','Divya Agarwal','Sanjay Kapoor','Ritu Sharma','Mohan Lal','Seema Jain','Prakash Hegde','Usha Rao','Naresh Gupta','Anita Biswas','Sanjiv Nair','Preeti Malhotra','Nitin Shukla','Rekha Choudhury','Rajiv Bansali','Sneha Kulkarni','Tarun Soni','Varsha Tripathi','Pankaj Mehta','Swati Dubey','Girish Kamath','Nalini Patel','Hemant Singh','Sapna Joshi','Rohit Das','Mamta Thakur','Bharat Bedi','Kamla Tiwari'];
const CP_FIRMS=['Kalpana Realty','RealEdge Partners','PropNest Brokers','HomeFirst Advisors','City Keys India','GreenLeaf Realty','Urban Square Brokers'];

const r = arr => arr[Math.floor(Math.random()*arr.length)];
const rn = (a,b) => Math.floor(Math.random()*(b-a+1))+a;

const LEADS = Array.from({length:108},(_,i)=>{
  const score=rn(10,99);
  return{id:i+1,name:NAMES[i%NAMES.length],phone:`+91 ${rn(7,9)}${String(rn(0,99999999)).padStart(9,'0')}`,
    source:r(SOURCES),stage:r(STAGES),heat:score>70?'Hot':score>40?'Warm':'Cold',
    score,agent:r(AGENTS),project:r(PROJECTS),budget:`₹${rn(45,320)}L`,
    lastActivity:`${rn(1,72)}h ago`,nextFollowup:`${rn(1,5)}d`,sla:rn(2,55),
    language:r(['Hindi','English','Marathi','Tamil','Telugu']),created:`${rn(1,28)}/0${rn(1,5)}/2025`};
});

const INVENTORY_STATUS=['Available','Hold','Soft Block','Booked','Sold'];
const INVENTORY=[];
['A','B','C'].forEach((tower,ti)=>{
  for(let fl=1;fl<=12;fl++)
    for(let ut=1;ut<=8;ut++){
      const st=r(INVENTORY_STATUS),area=rn(850,2800);
      INVENTORY.push({tower,floor:fl,unit:ut,id:`T${tower}-F${fl}-U${ut}`,
        status:st,area,price:Math.round(area*(rn(6800,12500)/10)*10),
        facing:r(['North','South','East','West','NE','NW','SE','SW']),
        type:area>2000?'Premium':area>1400?'Standard':'Economy',
        plc:rn(0,200000),floorRise:fl*25000,project:PROJECTS[ti]});
    }
});

const CPs=[
  {name:'Raj Properties',firm:CP_FIRMS[0],leads:18,comm:'₹4.2L',status:'Active',pending:'₹1.8L',approved:'₹2.4L',lock:42},

function ava(text,size=32,fs=12){
  const initials=text.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${fs}px">${initials}</div>`;
}

function statusClass(s){
  return s==='Available'?'u-avail':s==='Hold'?'u-hold':s==='Soft Block'?'u-soft':s==='Booked'?'u-booked':'u-sold';
}

function destroyChart(id){
  if(charts[id]){charts[id].destroy();delete charts[id];}
}

function mkChart(id,type,labels,datasets,opts={}){
  const ctx=document.getElementById(id);
  if(!ctx)return;
  destroyChart(id);
  charts[id]=new Chart(ctx,{type,data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},...(opts.plugins||{})},
      scales:type==='pie'||type==='doughnut'?{}:{
        x:{ticks:{color:'#8892b0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
        y:{ticks:{color:'#8892b0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
        ...( opts.scales||{})
      },...opts}});
}

function calcQuote(){

  const base=area*rate,parkC=park*350000,clubC=club*250000,plc=150000,fr=200000;
  const sub=base+parkC+clubC+plc+fr,discAmt=sub*(disc/100),after=sub-discAmt;
  const gst=after*0.05,legal=75000,total=after+gst+legal;
  const el=document.getElementById('quoteCost');if(!el)return;
  el.innerHTML=`
  ${[['Base Price',`${area} sqft × ₹${rate.toLocaleString()}/sqft`,base,false],
     ['Parking',`${park} covered slot(s)`,parkC,false],
     ['Club Membership','Premium access',clubC,false],
     ['PLC','Preferred location charge',plc,false],
     ['Floor Rise','Floor premium charge',fr,false],
     ['Discount',`${disc}% negotiated`,discAmt,true],
     ['GST','5% on unit value',gst,false],
     ['Legal & Registry','Stamp duty (approx)',legal,false]
  ].map(([n,d,v,neg])=>`
  <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--c-border);font-size:12px">

  </div>`).join('')}

  <button class="btn btn-primary" style="width:100%;justify-content:center"><i class="ti ti-send"></i>Send to Client</button>`;
}

function modal(title,body){
  const ov=document.createElement('div');
  ov.className='overlay';
  ov.id='modalOv';
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  ov.innerHTML=`<div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">${title}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    ${body}
  </div>`;
  document.body.appendChild(ov);
}

function closeModal(){
  document.getElementById('modalOv')?.remove();
}
